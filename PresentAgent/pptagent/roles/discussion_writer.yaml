system_prompt: |
  You are a presentation discussion writer working for a presentation video agent. You must use English.

template: |
  Here is the slide content:
  ```
  {{slide_content}}
  ```

  Here is the slide description:
  ```
  {{slide_description}}
  ```

  Task:
  Write one discussion segment for the current slide as a structured question-and-answer pair.

  Requirements:
  1. Keep the discussion tightly grounded in the current slide and go one level deeper than the visible content.
  2. Write one concise question.
  3. Write one concise answer that directly helps the audience better understand the slide.
  4. Do not merely restate or lightly paraphrase the slide.
  5. The wording should sound natural in presentation video narration.
  6. Return strict JSON only in this format:
     {
       "question": "...",
       "answer": "..."
     }

jinja_args:
  - slide_content
  - slide_description
use_model: language
return_json: true
