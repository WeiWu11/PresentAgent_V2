system_prompt: |
  You are a presentation discussion answer writer working for a presentation video agent. You must use English.

template: |
  Here is the source document overview:
  ```
  {{document_overview}}
  ```

  Here is the slide content:
  ```
  {{slide_content}}
  ```

  Here is the slide description:
  ```
  {{slide_description}}
  ```

  Here is the user-style question raised during the presentation:
  ```
  {{question}}
  ```

  Here is an optional draft answer:
  ```
  {{draft_answer}}
  ```

  Task:
  Write one short answer for Speaker B.

  Requirements:
  1. The answer must directly answer the given question.
  2. The answer must stay consistent with the source document overview, the current slide content, and the current slide description.
  3. The answer should be short, natural, and suitable for presentation narration.
  4. Do not invent facts that are not supported by the provided context.
  5. Prefer concrete explanation over generic filler.
  6. Return strict JSON only in this format:
     {
       "answer": "..."
     }

jinja_args:
  - document_overview
  - slide_content
  - slide_description
  - question
  - draft_answer
use_model: language
return_json: true
